<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heal — Learning Corner</title>
    <meta name="description" content="Explore diseases, symptoms, and treatments in an immersive medical encyclopedia.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #020617;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0f1e; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 999px; }

        /* ===== ANIMATED GRID ===== */
        .grid-bg {
            position: fixed; inset: 0; z-index: 0; opacity: 0.05;
            background-image:
                linear-gradient(rgba(56,189,248,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.3) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridDrift 25s linear infinite;
        }
        @keyframes gridDrift {
            0% { transform: translate(0,0); }
            100% { transform: translate(60px,60px); }
        }

        #labCanvas {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem;
            background: rgba(2,6,23,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(56,189,248,0.08);
        }
        .top-bar-left { display: flex; align-items: center; gap: 0.75rem; }
        .logo-dot {
            width: 28px; height: 28px; border-radius: 8px;
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-dot svg { width: 15px; height: 15px; color: #020617; }
        .top-bar h1 { font-family: 'Outfit'; font-size: 1rem; font-weight: 700; color: #fff; }
        .top-bar .badge {
            font-size: 0.6rem; color: #38bdf8; border: 1px solid rgba(56,189,248,0.2);
            padding: 0.1rem 0.5rem; border-radius: 999px; margin-left: 0.4rem;
        }
        .back-link {
            display: flex; align-items: center; gap: 0.4rem;
            color: #64748b; text-decoration: none; font-size: 0.8rem; font-weight: 500;
            padding: 0.35rem 0.8rem; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.06); transition: all 0.3s;
        }
        .back-link:hover { color: #fff; border-color: rgba(56,189,248,0.25); }
        .back-link svg { width: 14px; height: 14px; }

        /* ===== THREE PANE LAYOUT ===== */
        .three-pane {
            position: relative; z-index: 10;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            height: calc(100vh - 56px);
            margin-top: 56px;
        }

        /* ===== LEFT: DIRECTORY PANE ===== */
        .dir-pane {
            width: 280px; min-width: 280px;
            display: flex; flex-direction: column;
            border-right: 1px solid rgba(56,189,248,0.06);
            background: rgba(2,6,23,0.3);
        }
        .dir-search-wrap {
            padding: 1.25rem; border-bottom: 1px solid rgba(56,189,248,0.06);
        }
        .dir-search {
            width: 100%; background: rgba(56,189,248,0.05);
            border: 1px solid rgba(56,189,248,0.1);
            border-radius: 10px; padding: 0.7rem 1rem;
            color: #fff; font-family: 'Inter'; font-size: 0.85rem;
            outline: none; transition: all 0.3s ease;
        }
        .dir-search:focus {
            background: rgba(56,189,248,0.08);
            border-color: rgba(56,189,248,0.3);
            box-shadow: 0 0 15px rgba(56,189,248,0.1);
        }
        .dir-list { flex: 1; overflow-y: auto; padding: 1.25rem 0; }
        .dir-list::-webkit-scrollbar { width: 4px; }
        .dir-list::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.1); border-radius: 10px; }
        .dir-section-title {
            padding: 0.5rem 1.5rem 0.75rem;
            font-family: 'Outfit'; font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.15em;
            color: rgba(56,189,248,0.3);
        }
        .dir-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.7rem 1.25rem; cursor: pointer;
            transition: all 0.25s ease; position: relative;
            border-left: 3px solid transparent;
        }
        .dir-item:hover {
            background: rgba(56,189,248,0.04);
            border-left-color: rgba(56,189,248,0.2);
        }
        .dir-item.active {
            background: rgba(56,189,248,0.08);
            border-left-color: #38bdf8;
        }
        .dir-item.active::before {
            content: '';
            position: absolute; left: -3px; top: 15%; height: 70%; width: 3px;
            background: #38bdf8; border-radius: 999px;
            box-shadow: 0 0 10px rgba(56,189,248,0.6);
        }
        .dir-item .dir-emoji { font-size: 1.2rem; flex-shrink: 0; line-height: 1; }
        .dir-info { display: flex; flex-direction: column; min-width: 0; }
        .dir-item .dir-name {
            font-size: 0.85rem; font-weight: 500; color: #94a3b8; transition: color 0.25s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .dir-item.active .dir-name { color: #f1f5f9; font-weight: 600; }
        .dir-item .dir-cat {
            font-size: 0.6rem; color: #475569; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .dir-item.active .dir-cat { color: rgba(56,189,248,0.5); }
        .dir-pane, .symptom-pane { min-height: 0; }

        /* ===== CENTER: CORE CONDITION ===== */
        .center-pane {
            overflow-y: auto;
            display: flex; align-items: center; justify-content: center;
            position: relative; padding: 3rem 2.5rem;
        }
        .center-glow {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%,-50%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 65%);
            pointer-events: none; transition: opacity 0.6s;
        }

        /* Placeholder */
        .placeholder-view {
            text-align: center; position: relative; z-index: 1;
        }
        .placeholder-view .ph-icon {
            width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 1.5rem;
            background: rgba(56,189,248,0.06); border: 1.5px solid rgba(56,189,248,0.1);
            display: flex; align-items: center; justify-content: center;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
        .placeholder-view .ph-icon svg { width: 36px; height: 36px; color: rgba(56,189,248,0.4); }
        .placeholder-view h2 { font-family:'Outfit'; font-size:1.5rem; font-weight:700; color:#fff; margin-bottom:0.5rem; }
        .placeholder-view p { font-size:0.9rem; color:#64748b; max-width:320px; margin:0 auto; }

        /* Disease detail */
        .disease-detail {
            position: relative; z-index: 1; max-width: 520px; text-align: center;
            opacity: 0; transform: translateY(20px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.22,1,0.36,1);
            display: none;
        }
        .disease-detail.visible { opacity: 1; transform: translateY(0) scale(1); display: block; }

        .dd-icon-wrap {
            width: 120px; height: 120px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%);
            margin: 0 auto 1.5rem; position: relative;
        }
        .dd-icon-wrap::before {
            content:''; position:absolute; inset:-6px; border-radius:50%;
            border: 1.5px solid rgba(56,189,248,0.1); animation: iconSpin 8s linear infinite;
        }
        @keyframes iconSpin { to { transform: rotate(360deg); } }
        .dd-icon-wrap .dd-emoji { font-size: 3.5rem; filter: drop-shadow(0 0 16px rgba(56,189,248,0.25)); }

        .dd-name { font-family:'Outfit'; font-size:2.2rem; font-weight:800; color:#fff; margin-bottom:0.4rem; }
        .dd-category {
            font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.1em;
            color: rgba(56,189,248,0.5); margin-bottom:1.5rem;
        }
        .dd-desc {
            font-size:0.95rem; color:#cbd5e1; line-height:1.8; text-align:justify;
            white-space: pre-wrap; margin-top: 1.5rem;
        }

        /* ===== RIGHT: TABBED PANE ===== */
        .symptom-pane {
            border-left: 1px solid rgba(56,189,248,0.06);
            padding: 0;
            background: rgba(2,6,23,0.5);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .pane-tabs {
            display: flex; border-bottom: 1px solid rgba(56,189,248,0.08);
            flex-shrink: 0;
        }
        .pane-tab {
            flex: 1; padding: 0.9rem 0.75rem; text-align: center;
            font-family: 'Outfit'; font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: #64748b; cursor: pointer; transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .pane-tab.active { color: #38bdf8; background: rgba(56,189,248,0.04); border-bottom-color: #38bdf8; }
        .pane-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .pane-body::-webkit-scrollbar { width: 5px; }
        .pane-body::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.1); border-radius: 999px; }
        .pane-body.hidden { display: none; }
        .pane-tab:hover { color: #94a3b8; }
        .pane-tab.active {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }
        .pane-body {
            flex: 1; overflow-y: auto; padding: 0.5rem 0;
        }
        .pane-body.hidden { display: none; }

        /* Placeholder for right pane */
        .right-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; text-align: center; padding: 2rem; color: #334155;
        }
        .right-placeholder svg { width: 32px; height: 32px; margin-bottom: 0.75rem; opacity: 0.3; }
        .right-placeholder p { font-size: 0.85rem; }

        /* Symptom item with dotted indicator */
        .symptom-item {
            display: flex; align-items: flex-start; gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid rgba(56,189,248,0.03);
            opacity: 0; transform: translateX(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .symptom-item.visible { opacity: 1; transform: translateX(0); }

        .symptom-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #38bdf8; flex-shrink: 0; margin-top: 0.45rem;
            box-shadow: 0 0 6px rgba(56,189,248,0.4);
        }
        .symptom-dot.critical { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.4); }
        .symptom-dot.high { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.4); }

        .symptom-info { flex: 1; }
        .symptom-name { font-size: 0.88rem; color: #cbd5e1; font-weight: 500; margin-bottom: 0.3rem; }
        .symptom-weight-bar {
            height: 3px; border-radius: 999px; background: rgba(56,189,248,0.1);
            overflow: hidden; max-width: 140px;
        }
        .symptom-weight-fill {
            height: 100%; border-radius: 999px;
            transition: width 0.7s cubic-bezier(0.22,1,0.36,1);
        }
        .symptom-weight-fill.low { background: #22c55e; }
        .symptom-weight-fill.med { background: #38bdf8; }
        .symptom-weight-fill.high { background: #f59e0b; }
        .symptom-weight-fill.critical { background: #ef4444; }
        .symptom-weight-label {
            font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
            margin-top: 0.2rem;
        }
        .symptom-weight-label.low { color: #22c55e; }
        .symptom-weight-label.med { color: #38bdf8; }
        .symptom-weight-label.high { color: #f59e0b; }
        .symptom-weight-label.critical { color: #ef4444; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 960px) {
            .three-pane {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
            }
            .dir-pane {
                border-right: none;
                border-bottom: 1px solid rgba(56,189,248,0.06);
                max-height: 200px;
                display: flex; flex-wrap: wrap; gap: 0; padding: 0.5rem;
                overflow-x: auto; overflow-y: hidden;
            }
            .dir-item { white-space: nowrap; padding: 0.5rem 0.8rem; border-left: none; border-bottom: 2px solid transparent; }
            .dir-item.active { border-left: none; border-bottom-color: #38bdf8; }
            .dir-item.active::before { display: none; }
            .dir-section-title { display: none; }
            .symptom-pane { border-left: none; border-top: 1px solid rgba(56,189,248,0.06); max-height: 250px; }
            .dd-name { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <canvas id="labCanvas"></canvas>

    <!-- TOP BAR -->
    <header class="top-bar">
        <div class="top-bar-left">
            <a href="landing.html" style="display:flex;align-items:center;gap:0.75rem;text-decoration:none;">
                <div class="logo-dot">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                </div>
                <h1>Heal</h1>
            </a>
            <span class="badge">Learning Corner (Live)</span>
        </div>
        <a href="landing.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
            </svg>
            Back
        </a>
    </header>

    <!-- THREE PANE -->
    <div class="three-pane">
        <!-- LEFT: Directory -->
        <div class="dir-pane">
            <div class="dir-search-wrap">
                <input type="text" class="dir-search" placeholder="Search diseases or symptoms..." id="dirSearch">
            </div>
            <div class="dir-list" id="dirPane"></div>
        </div>

        <!-- CENTER: Core -->
        <div class="center-pane" id="centerPane">
            <div class="center-glow" id="centerGlow"></div>
            <div class="placeholder-view" id="placeholderView">
                <div class="ph-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
                    </svg>
                </div>
                <h2>Medical Encyclopedia</h2>
                <p>Select a condition from the directory to explore its clinical profile and symptoms.</p>
            </div>
            <div class="disease-detail" id="diseaseDetail">
                <div class="dd-icon-wrap"><span class="dd-emoji" id="ddEmoji"></span></div>
                <h2 class="dd-name" id="ddName"></h2>
                <div class="dd-category" id="ddCategory"></div>
                <p class="dd-desc" id="ddDesc"></p>
            </div>
        </div>

        <!-- RIGHT: Symptoms -->
        <div class="symptom-pane" id="symptomPane">
            <div class="pane-tabs">
                <div class="pane-tab active" data-tab="symptoms" onclick="switchTab('symptoms')">Clinical Symptoms</div>
                <div class="pane-tab" data-tab="medications" onclick="switchTab('medications')">Medications</div>
            </div>
            <div class="pane-body" id="symptomBody">
                <div class="right-placeholder" id="rightPlaceholder">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/>
                    </svg>
                    <p>Select a disease to view symptoms and medications.</p>
                </div>
            </div>
            <div class="pane-body hidden" id="medsBody"></div>
        </div>
    </div>

    <script>
    // ========== FULL DISEASE DATABASE ==========
    const DISEASES = [
        { id:'cold', emoji:'🤧', name:'Common Cold', category:'Respiratory', desc:'The common cold is a viral infectious disease of the upper respiratory tract that primarily affects the nasal mucosa. Over 200 virus strains are implicated, with rhinoviruses being the most common cause.\n\nSymptoms typically resolve within 7-10 days without specific treatment. Management focuses on symptomatic relief, rest, and adequate hydration. It is the most frequent infectious disease in humans, with adults averaging 2-3 episodes per year.',
            symptoms:[{n:'Nasal congestion',w:95},{n:'Runny nose',w:90},{n:'Sneezing',w:85},{n:'Sore throat',w:75},{n:'Mild cough',w:65},{n:'Low-grade fever',w:40},{n:'Fatigue',w:50}],
            meds:['Acetaminophen / Ibuprofen — Antipyretic and analgesic for fever and body aches','Pseudoephedrine — Nasal decongestant to relieve congestion','Dextromethorphan — Cough suppressant for dry, irritating cough','Saline nasal spray — Moisturizes nasal passages and clears mucus','Vitamin C & Zinc — May reduce duration if taken early','Rest & Hydration — Cornerstone of management']},
        { id:'flu', emoji:'🤒', name:'Influenza (Flu)', category:'Respiratory', desc:'Influenza is a contagious respiratory illness caused by influenza viruses that infect the nose, throat, and lungs. It can cause mild to severe illness and can lead to hospitalization or death in high-risk groups.\n\nSeasonal epidemics occur every year, with vaccination being the most effective preventive measure. Antiviral medications like Oseltamivir can reduce symptom duration by 1-2 days if administered within 48 hours.',
            symptoms:[{n:'High fever (>38.5°C)',w:95},{n:'Body aches & myalgia',w:90},{n:'Dry cough',w:82},{n:'Fatigue & weakness',w:88},{n:'Headache',w:72},{n:'Sore throat',w:55},{n:'Chills & sweats',w:78}],
            meds:['Oseltamivir (Tamiflu) — Neuraminidase inhibitor, reduces duration by 1-2 days','Zanamivir (Relenza) — Inhaled antiviral for Influenza A & B','Acetaminophen — Fever and pain management','Fluid replacement therapy — Oral or IV rehydration','Rest & isolation — 5-7 days bed rest to prevent transmission']},
        { id:'covid', emoji:'🦠', name:'COVID-19', category:'Respiratory', desc:'COVID-19 is caused by SARS-CoV-2, a novel coronavirus that emerged in late 2019. The disease ranges from asymptomatic to critical illness with acute respiratory distress syndrome (ARDS).\n\nDistinctive features include loss of taste/smell, and the disease can cause long-term complications ("Long COVID"). Vaccination, masking, and ventilation remain key prevention strategies.',
            symptoms:[{n:'Fever',w:88},{n:'Dry cough',w:85},{n:'Fatigue',w:80},{n:'Loss of taste/smell',w:92},{n:'Shortness of breath',w:75},{n:'Body aches',w:65},{n:'Headache',w:60},{n:'Sore throat',w:50}],
            meds:['Paxlovid (Nirmatrelvir/Ritonavir) — Antiviral for high-risk patients within 5 days','Dexamethasone — Corticosteroid for severe/critical cases requiring oxygen','Remdesivir — IV antiviral for hospitalized patients','Acetaminophen — Fever and pain management','Prone positioning — Improves oxygenation in severe cases']},
        { id:'gastro', emoji:'🤮', name:'Gastroenteritis', category:'Gastrointestinal', desc:'Gastroenteritis (stomach flu) is inflammation of the stomach and intestines, most commonly caused by viral infections (norovirus, rotavirus) or bacterial contamination of food or water.\n\nThe primary concern is dehydration, especially in young children and elderly patients. Oral rehydration therapy is the cornerstone of management, with antiemetics and antidiarrheals used for symptomatic relief.',
            symptoms:[{n:'Nausea & vomiting',w:95},{n:'Watery diarrhea',w:92},{n:'Abdominal cramps',w:88},{n:'Low-grade fever',w:60},{n:'Dehydration signs',w:70},{n:'Loss of appetite',w:75},{n:'Body aches',w:45}],
            meds:['Oral Rehydration Salts (ORS) — Electrolyte and fluid replacement','Ondansetron (Zofran) — Antiemetic for severe nausea/vomiting','Loperamide (Imodium) — Antidiarrheal (not for bacterial causes)','Probiotics — Restores gut flora balance','IV fluids — For severe dehydration cases']},
        { id:'migraine', emoji:'🧠', name:'Migraine', category:'Neurological', desc:'Migraine is a complex neurological condition characterized by recurrent episodes of moderate to severe headache, often unilateral and pulsating. It affects approximately 15% of the global population.\n\nMigraines involve activation of the trigeminovascular system and cortical spreading depression. Triggers include stress, hormonal changes, certain foods, and sleep disturbances. Treatment includes acute abortive therapy and chronic prophylaxis.',
            symptoms:[{n:'Severe throbbing headache',w:98},{n:'Nausea',w:80},{n:'Light sensitivity (photophobia)',w:85},{n:'Sound sensitivity (phonophobia)',w:78},{n:'Visual aura',w:55},{n:'Vomiting',w:50},{n:'Dizziness',w:45}],
            meds:['Sumatriptan (Imitrex) — Serotonin receptor agonist, first-line abortive therapy','Ibuprofen / Naproxen — NSAIDs for mild-moderate attacks','Topiramate — Prophylactic anticonvulsant for chronic migraine','Propranolol — Beta-blocker for migraine prevention','CGRP inhibitors (Aimovig) — Monthly injection for chronic migraine prevention']},
        { id:'asthma', emoji:'🫁', name:'Asthma Attack', category:'Respiratory', desc:'Asthma is a chronic inflammatory disorder of the airways characterized by episodic and reversible airflow obstruction, bronchial hyperresponsiveness, and underlying inflammation.\n\nDuring an acute attack, smooth muscle contraction, mucosal edema, and excess mucus production lead to significant airway narrowing. Management includes rescue bronchodilators (SABA) and long-term controller medications (ICS, LABA).',

    // ========== DIRECTORY LOGIC ==========
    const dirPane = document.getElementById('dirPane');
    const searchInput = document.getElementById('dirSearch');
    let currentIdx = -1;

    function renderDirectory(filterText = '') {
        const dirPane = document.getElementById('dirPane');
        if (!dirPane) return;
        
        dirPane.innerHTML = '';
        const search = filterText.toLowerCase().trim();

        // Group by category
        const filteredGroups = {};
        DISEASES.forEach((d, i) => {
            const matchName = d.name.toLowerCase().includes(search);
            const matchSymptom = d.symptoms && d.symptoms.some(s => s.n.toLowerCase().includes(search));
            
            if (matchName || matchSymptom) {
                if (!filteredGroups[d.category]) filteredGroups[d.category] = [];
                filteredGroups[d.category].push({ ...d, _index: i });
            }
        });

        const sortedCats = Object.keys(filteredGroups).sort();
        
        if (sortedCats.length === 0) {
            dirPane.innerHTML = `
                <div style="padding: 2.5rem 1.5rem; text-align: center;">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem; opacity: 0.3;">🔍</div>
                    <div style="font-size: 0.8rem; color: #475569;">No results for "${filterText}"</div>
                </div>
            `;
            return;
        }
        
        console.log("Rendering directory with", DISEASES.length, "items");

        sortedCats.forEach(cat => {
            // Category Header
            const title = document.createElement('div');
            title.className = 'dir-section-title';
            title.textContent = cat;
            dirPane.appendChild(title);

            // Category Items
            filteredGroups[cat].forEach(d => {
                const item = document.createElement('div');
                item.className = 'dir-item';
                if (currentIdx === d._index) item.classList.add('active');
                item.dataset.index = d._index;
                
                item.innerHTML = `
                    <span class="dir-emoji">${d.emoji}</span>
                    <div class="dir-info">
                        <div class="dir-name">${d.name}</div>
                        <div class="dir-cat">${d.category}</div>
                    </div>
                `;
                
                item.onclick = () => selectDisease(d._index);
                dirPane.appendChild(item);
            });
        });
    }

    // INITIALIZATION
    document.addEventListener('DOMContentLoaded', () => {
        renderDirectory();
        
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                renderDirectory(e.target.value);
            });
        }
    });

    // SELECT DISEASE
    const placeholderView = document.getElementById('placeholderView');
    const diseaseDetail = document.getElementById('diseaseDetail');
    const rightPlaceholder = document.getElementById('rightPlaceholder');
    const symptomBody = document.getElementById('symptomBody');

    function selectDisease(index) {
        try {
            if (index === currentIdx) return;
            const d = DISEASES[index];
            if (!d) return;
            
            currentIdx = index;
            console.log("Selecting disease:", d.name);

            // Update active dir item
            document.querySelectorAll('.dir-item').forEach(el => {
                el.classList.toggle('active', parseInt(el.dataset.index) === index);
            });

            // Start Transition
            diseaseDetail.classList.remove('visible');
            placeholderView.style.opacity = '0';
            
            setTimeout(() => {
                placeholderView.style.display = 'none';
                diseaseDetail.style.display = 'block';

                // Populate content
                document.getElementById('ddEmoji').textContent = d.emoji || '❓';
                document.getElementById('ddName').textContent = d.name || 'Unknown Condition';
                document.getElementById('ddCategory').textContent = d.category || 'Clinical';
                document.getElementById('ddDesc').textContent = (d.desc || 'Summary currently unavailable.').replace(/\\n/g, '\n');

                // Populate symptoms & meds
                if (rightPlaceholder) rightPlaceholder.style.display = 'none';
                populateSymptoms(d);
                populateMeds(d);

                // Stagger reset tabs
                switchTab('symptoms');

                // Force visibility
                requestAnimationFrame(() => {
                    diseaseDetail.classList.add('visible');
                    diseaseDetail.style.opacity = '1'; // Safety force
                });
            }, 300);
        } catch (err) {
            console.error("Critical Render Error:", err);
        }
    }

    function populateSymptoms(d) {
        symptomBody.querySelectorAll('.symptom-item').forEach(el => el.remove());
        d.symptoms.forEach((s, i) => {
            const level = s.w >= 85 ? 'critical' : s.w >= 65 ? 'high' : s.w >= 45 ? 'med' : 'low';
            const levelLabel = s.w >= 85 ? 'Critical' : s.w >= 65 ? 'Frequent' : s.w >= 45 ? 'Common' : 'Rare';
            const item = document.createElement('div');
            item.className = 'symptom-item';
            item.innerHTML = `
                <div class="symptom-dot ${level}"></div>
                <div class="symptom-info">
                    <div class="symptom-name">${s.n}</div>
                    <div class="symptom-weight-bar">
                        <div class="symptom-weight-fill ${level}" style="width: 0%;" data-w="${s.w}%"></div>
                    </div>
                    <div class="symptom-weight-label ${level}">${levelLabel}</div>
                </div>
            `;
            symptomBody.appendChild(item);
            setTimeout(() => {
                item.classList.add('visible');
                item.querySelector('.symptom-weight-fill').style.width = item.querySelector('.symptom-weight-fill').dataset.w;
            }, 80 + i * 60);
        });
    }

    const medsBody = document.getElementById('medsBody');
    function populateMeds(d) {
        medsBody.innerHTML = '';
        if (!d.meds) return;
        d.meds.forEach((m, i) => {
            const parts = m.split(' — ');
            const item = document.createElement('div');
            item.className = 'symptom-item';
            item.innerHTML = `
                <div class="symptom-dot med" style="background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.4);"></div>
                <div class="symptom-info">
                    <div class="symptom-name" style="color:#e2e8f0;font-weight:600;">${parts[0]}</div>
                    ${parts[1] ? '<div style="font-size:0.78rem;color:#64748b;margin-top:0.2rem;line-height:1.4;">' + parts[1] + '</div>' : ''}
                </div>
            `;
            medsBody.appendChild(item);
            setTimeout(() => item.classList.add('visible'), 80 + i * 60);
        });
    }

    function switchTab(tab) {
        document.querySelectorAll('.pane-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.getElementById('symptomBody').classList.toggle('hidden', tab !== 'symptoms');
        document.getElementById('medsBody').classList.toggle('hidden', tab !== 'medications');
    }

    // PARTICLES
    const canvas = document.getElementById('labCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    function initParticles() {
        particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                r: Math.random()*1.2+0.3, sx: (Math.random()-0.5)*0.2, sy: (Math.random()-0.5)*0.2,
                o: Math.random()*0.2+0.04 });
        }
    }
    function drawParticles() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => {
            p.x+=p.sx; p.y+=p.sy;
            if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0;
            if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(56,189,248,${p.o})`; ctx.fill();
        });
        for(let i=0;i<particles.length;i++){
            for(let j=i+1;j<particles.length;j++){
                const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
                const d=Math.sqrt(dx*dx+dy*dy);
                if(d<90){ ctx.beginPath(); ctx.strokeStyle=`rgba(56,189,248,${0.03*(1-d/90)})`;
                    ctx.lineWidth=0.4; ctx.moveTo(particles[i].x,particles[i].y);
                    ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); }
            }
        }
        requestAnimationFrame(drawParticles);
    }
    resize(); initParticles(); drawParticles();
    addEventListener('resize',()=>{resize();initParticles();});
    </script>
</body>
</html>
